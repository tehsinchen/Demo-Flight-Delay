name: CI Orchestrator

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Define global constants once and reuse via `needs.globals.outputs.*` ----
  globals:
    name: Set Global Constants
    runs-on: self-hosted
    outputs:
      service_root: ${{ steps.set.outputs.service_root }}
    steps:
      - id: set
        name: Define SERVICE_ROOT
        run: |
          # >>> Change only this line when you move your services directory <<<
          echo "service_root=project/services" >> "$GITHUB_OUTPUT"

  changes:
    name: Detect Changed Paths
    needs: [globals]
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      crawler:  ${{ steps.filter.outputs.crawler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is fine; base/head will control compare range explicitly
          fetch-depth: 0

      - name: Paths filter (push)
        if: ${{ github.event_name == 'push' }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          filters: |
            frontend:
              - '${{ needs.globals.outputs.service_root }}/frontend/**'
            backend:
              - '${{ needs.globals.outputs.service_root }}/backend/**'
            crawler:
              - '${{ needs.globals.outputs.service_root }}/crawler/**'

      - name: Paths filter (PR)
        if: ${{ github.event_name == 'pull_request' }}
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          filters: |
            frontend:
              - '${{ needs.globals.outputs.service_root }}/frontend/**'
            backend:
              - '${{ needs.globals.outputs.service_root }}/backend/**'
            crawler:
              - '${{ needs.globals.outputs.service_root }}/crawler/**'

  # --- A) Build & Push images to ECR (only when changed) ---
  build_frontend:
    needs: [globals, changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    name: Build & Push - frontend
    uses: ./.github/workflows/_build-and-push.yml
    with:
      service: frontend
      context: ${{ needs.globals.outputs.service_root }}/frontend
      dockerfile: ${{ needs.globals.outputs.service_root }}/frontend/Dockerfile
      ecr-repo: ${{ vars.ECR_REPO_PREFIX }}/frontend
    secrets: inherit

  build_backend:
    needs: [globals, changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    name: Build & Push - backend
    uses: ./.github/workflows/_build-and-push.yml
    with:
      service: backend
      context: ${{ needs.globals.outputs.service_root }}/backend
      dockerfile: ${{ needs.globals.outputs.service_root }}/backend/Dockerfile
      ecr-repo: ${{ vars.ECR_REPO_PREFIX }}/backend
    secrets: inherit

  build_crawler:
    needs: [globals, changes]
    if: ${{ needs.changes.outputs.crawler == 'true' }}
    name: Build & Push - crawler
    uses: ./.github/workflows/_build-and-push.yml
    with:
      service: crawler
      context: ${{ needs.globals.outputs.service_root }}/crawler
      dockerfile: ${{ needs.globals.outputs.service_root }}/crawler/Dockerfile
      ecr-repo: ${{ vars.ECR_REPO_PREFIX }}/crawler
    secrets: inherit

  # --- B) Terraform (left as-is per your request) ---
  # terraform:
  #   needs: [changes]
  #   if: ${{ needs.changes.outputs.terraform == 'true' }}
  #   name: Terraform Plan/Apply
