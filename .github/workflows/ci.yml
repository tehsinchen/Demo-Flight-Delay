name: CI Orchestrator

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SERVICE_ROOT: project/services

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      crawler:  ${{ steps.filter.outputs.crawler }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            frontend:
              - '${{ env.SERVICE_ROOT }}/frontend/**'
            backend:
              - '${{ env.SERVICE_ROOT }}/backend/**'
            crawler:
              - '${{ env.SERVICE_ROOT }}/crawler/**'

  # --- A) Build & Push images to ECR (only when changed) ---
  build_frontend:
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    name: Build & Push - frontend
    uses: ./.github/workflows/_build-and-push.yml
    with:
      service: frontend
      context: ${{ env.SERVICE_ROOT }}/frontend
      dockerfile: ${{ env.SERVICE_ROOT }}/frontend/Dockerfile
      ecr-repo: ${{ vars.ECR_REPO_PREFIX }}/frontend

  build_backend:
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    name: Build & Push - backend
    uses: ./.github/workflows/_build-and-push.yml
    with:
      service: backend
      context: ${{ env.SERVICE_ROOT }}/backend
      dockerfile: ${{ env.SERVICE_ROOT }}/backend/Dockerfile
      ecr-repo: ${{ vars.ECR_REPO_PREFIX }}/backend

  build_crawler:
    needs: [changes]
    if: ${{ needs.changes.outputs.crawler == 'true' }}
    name: Build & Push - crawler
    uses: ./.github/workflows/_build-and-push.yml
    with:
      service: crawler
      context: ${{ env.SERVICE_ROOT }}/crawler
      dockerfile: ${{ env.SERVICE_ROOT }}/crawler/Dockerfile
      ecr-repo: ${{ vars.ECR_REPO_PREFIX }}/crawler

