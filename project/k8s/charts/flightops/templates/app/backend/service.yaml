apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.appNamespace }}
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: {{ .Values.appNamespace }}
