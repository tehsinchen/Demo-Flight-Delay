apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit-sa
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush           1
        Log_Level       info
        Daemon          off
        Parsers_File    parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Tag               kube.*
        Parser            cri
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off

    # Compute dynamic index prefix: <namespace>-<app>
    [FILTER]
        Name                lua
        Match               kube.*
        script              /fluent-bit/etc/index.lua
        call                set_index_prefix

    [OUTPUT]
        Name                es
        Match               kube.*
        Host                elasticsearch
        Port                9200

        # ES 8: do not send _type
        Suppress_Type_Name  On

        # Dynamic logstash-style index: <prefix>-YYYY.MM.DD
        Logstash_Format     On
        Logstash_Prefix_Key es_prefix

        # Recommended when kubernetes adds dotted keys (labels/annotations)
        Replace_Dots        On

        Retry_Limit         False

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>P|F) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

  index.lua: |
    function set_index_prefix(tag, ts, record)
      local ns = "unknown"
      local app = "unknown"

      local k8s = record["kubernetes"]
      if k8s ~= nil then
        if k8s["namespace_name"] ~= nil then
          ns = k8s["namespace_name"]
        end

        local labels = k8s["labels"]
        if labels ~= nil then
          if labels["app.kubernetes.io/name"] ~= nil then
            app = labels["app.kubernetes.io/name"]
          elseif labels["app"] ~= nil then
            app = labels["app"]
          end
        end

        if app == "unknown" and k8s["container_name"] ~= nil then
          app = k8s["container_name"]
        end
      end

      local prefix = string.lower(ns .. "-" .. app)
      prefix = string.gsub(prefix, "[^a-z0-9-_]+", "-")
      prefix = string.gsub(prefix, "^-+", "")
      prefix = string.gsub(prefix, "-+$", "")

      record["es_prefix"] = prefix
      return 1, ts, record
    end
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-read
rules:
  - apiGroups: [""]
    resources: ["namespaces","pods"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-read-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-read
subjects:
  - kind: ServiceAccount
    name: fluent-bit-sa
    namespace: logging
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit-sa
      containers:
        - name: fluent-bit
          image: cr.fluentbit.io/fluent/fluent-bit:2.2.3
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluent-bit-config
